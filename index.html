<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J11 Trener</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; font-family: system-ui, sans-serif; }
    select option { background: #1e293b; color: #f1f5f9; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef } = React;

// New positions with colour coding
const ALL_POSITIONS = ["Keeper","V. Back","H. Back","V. Kant","H. Kant","Sentral midt","Angriper"];

const POS_COLOR = {
  "Keeper":       "#7c3aed",
  "V. Back":      "#0ea5e9",
  "H. Back":      "#0ea5e9",
  "V. Kant":      "#f59e0b",
  "H. Kant":      "#f59e0b",
  "Sentral midt": "#10b981",
  "Angriper":     "#ef4444",
};

// 1-2-3-1 rows
const POS_ROW = {
  "Keeper":       "Keeper",
  "V. Back":      "Back",
  "H. Back":      "Back",
  "V. Kant":      "Midtbane",
  "H. Kant":      "Midtbane",
  "Sentral midt": "Midtbane",
  "Angriper":     "Angriper",
};

const FORMATION_ROWS = ["Angriper","Midtbane","Back","Keeper"];

const LEARNING_CATEGORIES = [
  { id: "teknikk", label: "⚽ Teknikk", color: "#f59e0b" },
  { id: "taktikk", label: "🧠 Taktikk", color: "#3b82f6" },
  { id: "innsats", label: "💪 Innsats", color: "#10b981" },
];

const RATINGS = [1,2,3,4,5];
const fmt = (sec) => `${String(Math.floor(sec/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`;

function Pitch({ activePlayers, subMode, setSubMode, getDisplayTime, onChangePosition, doSub }) {
  const [, setTick] = useState(0);
  const [posMenu, setPosMenu] = useState(null);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t+1), 1000);
    return () => clearInterval(id);
  }, []);

  // Group by row, but within Midtbane: sentral midt always in the middle
  const byRow = {};
  FORMATION_ROWS.forEach(r => byRow[r] = []);
  activePlayers.forEach(p => {
    const row = POS_ROW[p.position] || "Midtbane";
    byRow[row].push(p);
  });
  // Fixed left→right order per row
  const midOrder  = { "V. Kant":0, "Sentral midt":1, "H. Kant":2 };
  const backOrder = { "V. Back":0, "H. Back":1 };
  byRow["Midtbane"].sort((a,b) => (midOrder[a.position]??1)  - (midOrder[b.position]??1));
  byRow["Back"].sort((a,b)     => (backOrder[a.position]??0) - (backOrder[b.position]??0));

  const handleClick = (p) => {
    if (posMenu === p.id) { setPosMenu(null); return; }
    setPosMenu(null);
    if (subMode?.outId === p.id) {
      setSubMode(null); // deselect
    } else if (subMode && p.active) {
      // Second field player clicked → swap roles
      doSub(p.id);
    } else {
      setSubMode({ outId: p.id });
    }
  };

  return (
    <div style={pitch.wrap}>
      <div style={pitch.halfLine} />
      <div style={pitch.centerCircle} />
      <div style={pitch.penaltyTop} />
      <div style={pitch.penaltyBot} />

      {FORMATION_ROWS.map(row => (
        <div key={row} style={pitch.row}>
          {byRow[row].map(p => {
            const t = getDisplayTime(p);
            const isOut = subMode?.outId === p.id;
            const showPos = posMenu === p.id;
            const col = POS_COLOR[p.position] || "#10b981";
            return (
              <div key={p.id} style={{position:"relative"}}>
                <div style={{
                  ...pitch.player,
                  background: isOut ? "#f59e0b" : col,
                  boxShadow: isOut ? "0 0 0 3px #fef3c7" : "0 2px 10px rgba(0,0,0,0.5)",
                  transform: isOut ? "scale(1.12)" : "scale(1)",
                }}
                  onClick={() => handleClick(p)}
                  onContextMenu={e => { e.preventDefault(); setPosMenu(showPos ? null : p.id); }}
                >
                  <div style={pitch.posTag}>{p.position}</div>
                  <div style={pitch.playerName}>{p.name.split(" ")[0]}</div>
                  <div style={pitch.playerTime}>{fmt(t)}</div>
                </div>
                {showPos && (
                  <div style={pitch.posMenu}>
                    {ALL_POSITIONS.map(pos => (
                      <button key={pos}
                        style={{...pitch.posBtn, background: p.position===pos ? POS_COLOR[pos] : "#1e293b"}}
                        onClick={e => { e.stopPropagation(); onChangePosition(p.id, pos); setPosMenu(null); }}>
                        {pos}
                      </button>
                    ))}
                    <button style={{...pitch.posBtn, background:"#374151"}}
                      onClick={e => { e.stopPropagation(); setPosMenu(null); }}>✕ Avbryt</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

const pitch = {
  wrap: { position:"relative", background:"#15803d", borderRadius:12, margin:"0 12px 12px", padding:"10px 8px", minHeight:330, display:"flex", flexDirection:"column", justifyContent:"space-between", overflow:"visible", border:"2px solid #166534" },
  halfLine: { position:"absolute", left:12, right:12, top:"50%", height:1, background:"rgba(255,255,255,0.18)" },
  centerCircle: { position:"absolute", left:"50%", top:"50%", transform:"translate(-50%,-50%)", width:56, height:56, borderRadius:"50%", border:"1px solid rgba(255,255,255,0.18)", pointerEvents:"none" },
  penaltyTop: { position:"absolute", left:"28%", right:"28%", top:0, height:44, border:"1px solid rgba(255,255,255,0.15)", borderTop:"none", borderRadius:"0 0 6px 6px", pointerEvents:"none" },
  penaltyBot: { position:"absolute", left:"28%", right:"28%", bottom:0, height:44, border:"1px solid rgba(255,255,255,0.15)", borderBottom:"none", borderRadius:"6px 6px 0 0", pointerEvents:"none" },
  row: { display:"flex", justifyContent:"center", alignItems:"center", gap:10, zIndex:1, padding:"3px 0" },
  player: { width:70, minHeight:62, borderRadius:10, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", cursor:"pointer", transition:"all 0.15s", padding:"4px 3px" },
  posTag: { fontSize:9, color:"rgba(255,255,255,0.75)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.5, marginBottom:1 },
  playerName: { color:"#fff", fontWeight:800, fontSize:13, textAlign:"center", maxWidth:66, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" },
  playerTime: { color:"rgba(255,255,255,0.9)", fontSize:11, fontVariantNumeric:"tabular-nums", marginTop:2, fontWeight:700 },
  posMenu: { position:"absolute", zIndex:20, top:"105%", left:"50%", transform:"translateX(-50%)", background:"#0f172a", borderRadius:10, padding:6, display:"flex", flexDirection:"column", gap:3, boxShadow:"0 8px 28px rgba(0,0,0,0.6)", minWidth:120, marginTop:2 },
  posBtn: { border:"none", color:"#f1f5f9", borderRadius:6, padding:"6px 10px", cursor:"pointer", fontSize:12, fontWeight:600, textAlign:"left" },
};

function NoteCard({ n, players, onSave, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ text: n.text, category: n.category, player: n.player, rating: n.rating });
  const cat = LEARNING_CATEGORIES.find(c => c.id === (editing ? draft.category : n.category));

  if (editing) return (
    <div style={{...s.noteCard, border:"1px solid #3b82f6"}}>
      <div style={s.btnRow}>
        {LEARNING_CATEGORIES.map(c => (
          <button key={c.id}
            style={draft.category===c.id?{...s.pill,background:c.color,color:"#fff",border:"none"}:s.pill}
            onClick={() => setDraft(d=>({...d,category:c.id}))}>
            {c.label}
          </button>
        ))}
      </div>
      <select style={s.input} value={draft.player} onChange={e => setDraft(d=>({...d,player:e.target.value}))}>
        <option value="">Hele laget</option>
        {players.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}
      </select>
      <textarea style={{...s.input,height:64,resize:"none"}} value={draft.text}
        onChange={e => setDraft(d=>({...d,text:e.target.value}))} />
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
        <span style={{color:"#9ca3af",fontSize:12}}>Vurdering:</span>
        {RATINGS.map(r => (
          <button key={r} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",opacity:draft.rating>=r?1:0.3}}
            onClick={() => setDraft(d=>({...d,rating:r}))}>⭐</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button style={{...s.bigBtn,flex:1,fontSize:14,padding:"10px"}} onClick={() => { onSave(draft); setEditing(false); }}>Lagre</button>
        <button style={{...s.bigBtn,flex:1,fontSize:14,padding:"10px",background:"#374151"}} onClick={() => setEditing(false)}>Avbryt</button>
      </div>
    </div>
  );

  return (
    <div style={s.noteCard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{...s.catBadge,background:cat.color}}>{cat.label}</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={s.stars}>{"★".repeat(n.rating)}{"☆".repeat(5-n.rating)}</span>
          <button style={{...s.smBtn,background:"#1e3a5f",color:"#93c5fd",padding:"3px 7px"}} onClick={() => setEditing(true)}>✏️</button>
          <button style={{...s.smBtn,background:"#3b1515",color:"#fca5a5",padding:"3px 7px"}} onClick={onDelete}>🗑️</button>
        </div>
      </div>
      {n.player && <div style={s.notePlayer}>👤 {n.player}</div>}
      <div style={s.noteText}>{n.text}</div>
      <div style={s.noteTime}>{fmt(n.time)}</div>
    </div>
  );
}

function BenchPlayerRow({ p, subMode, doSub, onChangePosition }) {
  const [editPos, setEditPos] = useState(false);
  const col = POS_COLOR[p.position] || "#6b7280";
  return (
    <div style={{...s.playerRow, background:subMode?"rgba(16,185,129,0.04)":"transparent"}}>
      <div style={{...s.dot, background:col}} />
      <div style={{flex:1}}>
        <div style={s.playerName}>{p.name}</div>
        {editPos
          ? <select autoFocus style={s.posSelect} value={p.position}
              onChange={e => { onChangePosition(p.id, e.target.value); setEditPos(false); }}
              onBlur={() => setEditPos(false)}>
              {ALL_POSITIONS.map(pos => <option key={pos}>{pos}</option>)}
            </select>
          : <div style={{...s.posLabel,cursor:"pointer",textDecoration:"underline dotted"}}
              onClick={() => setEditPos(true)}>
              {p.position} ✏️
            </div>
        }
      </div>
      <span style={s.timeChip}>{fmt(p.totalTime)}</span>
      {subMode && <button style={{...s.smBtn,...s.green}} onClick={() => doSub(p.id)}>Inn ↑</button>}
    </div>
  );
}

function App() {
  const [view, setView] = useState("setup");
  const [sessionType, setSessionType] = useState("kamp");
  const DEFAULT_PLAYERS = [
    { id:0,  name:"Spiller 1",  position:"Keeper",       active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:1,  name:"Spiller 2",  position:"V. Back",      active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:2,  name:"Spiller 3",  position:"H. Back",      active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:3,  name:"Spiller 4",  position:"V. Kant",      active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:4,  name:"Spiller 5",  position:"Sentral midt", active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:5,  name:"Spiller 6",  position:"H. Kant",      active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:6,  name:"Spiller 7",  position:"Angriper",     active:true,  absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:7,  name:"Spiller 8",  position:"Sentral midt", active:false, absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:8,  name:"Spiller 9",  position:"V. Back",      active:false, absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:9,  name:"Spiller 10", position:"H. Back",      active:false, absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:10, name:"Spiller 11", position:"Angriper",     active:false, absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
    { id:11, name:"Spiller 12", position:"V. Kant",      active:false, absent:false, borrowed:false, totalTime:0, sessionStart:null, roleTimes:{}, roleStart:null },
  ];

  const load = (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  };
  const save = (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  };

  const [players, setPlayers] = useState(() => load("j11_players", DEFAULT_PLAYERS));
  const [sessions, setSessions] = useState(() => load("j11_sessions", []));
  const [editingName, setEditingName] = useState(null);
  const [timer, setTimer] = useState(0);
  const [running, setRunning] = useState(false);
  const [events, setEvents] = useState([]);
  const [notes, setNotes] = useState([]);
  const [newNote, setNewNote] = useState({ text:"", category:"teknikk", player:"", rating:3 });
  const [showNoteForm, setShowNoteForm] = useState(false);
  const [subMode, setSubMode] = useState(null);
  const [tab, setTab] = useState("spill");
  const [opponent, setOpponent] = useState("");
  const [score, setScore] = useState({ home:0, away:0 });
  const [setupTab, setSetupTab] = useState("ny");
  const intervalRef = useRef(null);

  // Auto-save whenever players or sessions change
  useEffect(() => { save("j11_players", players); }, [players]);
  useEffect(() => { save("j11_sessions", sessions); }, [sessions]);

  useEffect(() => {
    if (running) intervalRef.current = setInterval(() => setTimer(t => t+1), 1000);
    else clearInterval(intervalRef.current);
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const startSession = () => {
    const now = Date.now();
    setPlayers(prev => prev.map(p => p.active ? {...p, sessionStart:now, roleStart:now} : p));
    setRunning(true); setView("session"); setTimer(0);
    setEvents([{ time:0, text:`${sessionType==="kamp"?"⚽ Kamp":"🏃 Trening"} startet!` }]);
  };

  const pauseResume = () => {
    const now = Date.now();
    if (running) {
      setPlayers(prev => prev.map(p => {
        if (!p.active || !p.sessionStart) return p;
        const gained = Math.floor((now-p.sessionStart)/1000);
        const f = flushRole(p, now);
        return {...f, totalTime:f.totalTime+gained, sessionStart:null, roleStart:null};
      }));
    } else {
      setPlayers(prev => prev.map(p => p.active ? {...p, sessionStart:now, roleStart:now} : p));
    }
    setRunning(r => !r);
  };

  // Flush accumulated role time for a player into roleTimes
  const flushRole = (p, now) => {
    if (!p.roleStart || !p.active) return p;
    const gained = Math.floor((now - p.roleStart) / 1000);
    const roleTimes = {...p.roleTimes, [p.position]: (p.roleTimes[p.position]||0) + gained};
    return {...p, roleTimes, roleStart: now};
  };

  const doSub = (inId) => {
    const now = Date.now();
    const outPlayer = players.find(p=>p.id===subMode.outId);
    const inPlayer  = players.find(p=>p.id===inId);
    const outName = outPlayer?.name;
    const inName  = inPlayer?.name;
    const outPos  = outPlayer?.position;

    if (outPlayer?.active && inPlayer?.active) {
      // Swap roles between two field players — flush both first
      setPlayers(prev => prev.map(p => {
        if (p.id===subMode.outId) { const f=flushRole(p,now); return {...f, position:inPlayer.position, roleStart:now}; }
        if (p.id===inId)          { const f=flushRole(p,now); return {...f, position:outPos, roleStart:now}; }
        return p;
      }));
      setEvents(prev => [{time:timer, text:`🔁 ${outName} (${outPos}) ↔ ${inName} (${inPlayer.position})`}, ...prev]);
    } else {
      // Normal sub: bench player comes on with outgoing player's position
      setPlayers(prev => prev.map(p => {
        if (p.id===subMode.outId) {
          const gained = p.sessionStart ? Math.floor((now-p.sessionStart)/1000) : 0;
          const f = flushRole(p, now);
          return {...f, active:false, totalTime:f.totalTime+gained, sessionStart:null, roleStart:null};
        }
        if (p.id===inId) return {...p, active:true, sessionStart:running?now:null, position:outPos, roleStart:running?now:null};
        return p;
      }));
      setEvents(prev => [{time:timer, text:`🔄 ${inName} inn for ${outName} (${outPos})`}, ...prev]);
    }
    setSubMode(null);
  };

  const changePosition = (playerId, newPos) => {
    const now = Date.now();
    const pl = players.find(p=>p.id===playerId);
    setPlayers(prev => prev.map(p => {
      if (p.id!==playerId) return p;
      const f = flushRole(p, now);
      return {...f, position:newPos, roleStart:now};
    }));
    if (view==="session")
      setEvents(prev => [{time:timer, text:`📋 ${pl?.name}: ${pl?.position} → ${newPos}`}, ...prev]);
  };

  const endSession = () => {
    const now = Date.now();
    const finalPlayers = players.map(p => {
      if (p.active && p.sessionStart) {
        const gained = Math.floor((now-p.sessionStart)/1000);
        const f = flushRole(p, now);
        return {...f, totalTime:f.totalTime+gained, sessionStart:null, active:false, roleStart:null};
      }
      return p;
    });
    setRunning(false);
    setSessions(prev => [...prev, {
      id:Date.now(), type:sessionType, opponent, score,
      duration:timer, players:finalPlayers, notes, events,
      date:new Date().toLocaleDateString("nb-NO")
    }]);
    setPlayers(finalPlayers);
    setView("summary");
  };

  const addNote = () => {
    if (!newNote.text.trim()) return;
    setNotes(prev => [...prev, {...newNote, id:Date.now(), time:timer}]);
    setNewNote({ text:"", category:"teknikk", player:"", rating:3 });
    setShowNoteForm(false);
  };

  const [showAddBorrowed, setShowAddBorrowed] = useState(false);
  const [newBorrowed, setNewBorrowed] = useState({ name:"", position:"Midtbane" });

  const addBorrowedPlayer = () => {
    if (!newBorrowed.name.trim()) return;
    const newId = Date.now();
    setPlayers(prev => [...prev, {
      id: newId, name: newBorrowed.name.trim(), position: newBorrowed.position,
      active: false, absent: false, borrowed: true,
      totalTime: 0, sessionStart: null, roleTimes: {}, roleStart: null
    }]);
    setNewBorrowed({ name:"", position:"Midtbane" });
    setShowAddBorrowed(false);
  };

  const removeBorrowedPlayers = () => {
    setPlayers(prev => prev.filter(p => !p.borrowed));
  };
  const deleteNote = (id) => setNotes(prev => prev.filter(n => n.id!==id));

  const resetAll = () => {
    setView("setup"); setTimer(0); setRunning(false);
    setEvents([]); setNotes([]); setSubMode(null);
    setOpponent(""); setScore({home:0,away:0});
    // Remove borrowed players, reset session state but keep absent flags
    setPlayers(prev => prev
      .filter(p => !p.borrowed)
      .map(p => ({...p, active:p.id<7, sessionStart:null, roleStart:null, roleTimes:{}}))
    );
  };

  const getDisplayTime = (p) => {
    if (p.active && p.sessionStart && running)
      return p.totalTime + Math.floor((Date.now()-p.sessionStart)/1000);
    return p.totalTime;
  };

  const activePlayers = players.filter(p => p.active && !p.absent);
  const benchPlayers  = players.filter(p => !p.active && !p.absent).sort((a,b) => a.totalTime-b.totalTime);

  // ---- SETUP ----
  if (view==="setup") {
    const totalDuration = sessions.reduce((sum,s)=>sum+s.duration,0);
    const totalByPlayer = {};
    sessions.forEach(sess => sess.players.forEach(p => {
      totalByPlayer[p.name] = (totalByPlayer[p.name]||0)+p.totalTime;
    }));
    const totalEntries = Object.entries(totalByPlayer).sort((a,b)=>b[1]-a[1]);
    return (
      <div style={s.page}>
        <div style={s.header}>
          <div style={s.logo}>⚽</div>
          <h1 style={s.title}>J11 Trener</h1>
          <p style={s.sub}>Spilletid · Bytter · Læring</p>
        </div>
        <div style={s.tabs}>
          {["ny","total"].map(t => (
            <button key={t} style={setupTab===t?{...s.tabBtn,...s.tabActive}:s.tabBtn} onClick={()=>setSetupTab(t)}>
              {t==="ny"?"⚽ Ny økt":"📊 Total"}
            </button>
          ))}
        </div>
        {setupTab==="ny" && (<>
          <div style={s.card}>
            <h3 style={s.cardTitle}>🎯 Økttype</h3>
            <div style={s.btnRow}>
              {["kamp","trening"].map(t => (
                <button key={t} style={sessionType===t?{...s.pill,...s.pillActive}:s.pill} onClick={()=>setSessionType(t)}>
                  {t==="kamp"?"⚽ Kamp":"🏃 Trening"}
                </button>
              ))}
            </div>
            {sessionType==="kamp" && <input style={s.input} placeholder="Motstander..." value={opponent} onChange={e=>setOpponent(e.target.value)} />}
          </div>
          <div style={s.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <h3 style={{...s.cardTitle,margin:0}}>👥 Spillere</h3>
              <button style={{...s.smBtn,...s.green}} onClick={()=>setShowAddBorrowed(v=>!v)}>
                {showAddBorrowed?"✕":"+ Innlånt"}
              </button>
            </div>

            {showAddBorrowed && (
              <div style={{...s.noteForm, marginBottom:12}}>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:6,fontWeight:700}}>🔀 Legg til innlånt spiller</div>
                <input style={s.input} placeholder="Navn..." value={newBorrowed.name}
                  onChange={e=>setNewBorrowed(b=>({...b,name:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addBorrowedPlayer()} />
                <select style={{...s.input,marginBottom:8}} value={newBorrowed.position}
                  onChange={e=>setNewBorrowed(b=>({...b,position:e.target.value}))}>
                  {ALL_POSITIONS.map(pos=><option key={pos}>{pos}</option>)}
                </select>
                <button style={s.bigBtn} onClick={addBorrowedPlayer}>Legg til</button>
              </div>
            )}

            {/* Present players */}
            {players.filter(p=>!p.absent).map(p => (
              <div key={p.id} style={{...s.playerRow, flexWrap:"wrap"}}>
                <div style={{...s.dot, background:p.borrowed?"#a855f7":POS_COLOR[p.position]||"#6b7280"}} />
                <div style={{flex:1, minWidth:0}}>
                  {editingName===p.id
                    ? <input
                        autoFocus
                        style={s.nameInput}
                        value={p.name}
                        onChange={e=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,name:e.target.value}:x))}
                        onBlur={()=>setEditingName(null)}
                        onKeyDown={e=>e.key==="Enter"&&setEditingName(null)} />
                    : <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={s.playerName}>{p.name}</span>
                        {p.borrowed && <span style={s.borrowedTag}>innlånt</span>}
                      </div>
                  }
                </div>
                <button
                  style={{...s.smBtn, background:"#334155", color:"#94a3b8", padding:"5px 7px"}}
                  onClick={()=>setEditingName(editingName===p.id ? null : p.id)}>
                  ✏️
                </button>
                <select style={s.select} value={p.position}
                  onChange={e=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,position:e.target.value}:x))}>
                  {ALL_POSITIONS.map(pos=><option key={pos}>{pos}</option>)}
                </select>
                <button style={p.active?{...s.smBtn,...s.green}:{...s.smBtn,...s.gray}}
                  onClick={()=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,active:!x.active}:x))}>
                  {p.active?"På":"Benk"}
                </button>
                {!p.borrowed && (
                  <button style={{...s.smBtn,background:"#1e293b",color:"#64748b",padding:"5px 6px"}}
                    onClick={()=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,absent:true,active:false}:x))}
                    title="Merk som fraværende">✕</button>
                )}
              </div>
            ))}

            {/* Absent players */}
            {players.filter(p=>p.absent).length > 0 && (
              <div style={{marginTop:10}}>
                <div style={{fontSize:11,color:"#64748b",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Fraværende</div>
                {players.filter(p=>p.absent).map(p => (
                  <div key={p.id} style={{...s.playerRow, opacity:0.5}}>
                    <div style={{...s.dot, background:"#374151"}} />
                    <span style={{...s.playerName,flex:1,color:"#64748b"}}>{p.name}</span>
                    <button style={{...s.smBtn,background:"#1e3a5f",color:"#93c5fd"}}
                      onClick={()=>setPlayers(prev=>prev.map(x=>x.id===p.id?{...x,absent:false}:x))}>
                      Tilbake
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{padding:"0 16px 32px"}}>
            <button style={s.bigBtn} onClick={startSession}>
              {sessionType==="kamp"?"⚽ Start kamp":"🏃 Start trening"}
            </button>
          </div>
        </>)}
        {setupTab==="total" && (<>
          {sessions.length===0
            ? <div style={s.card}><p style={s.empty}>Ingen økter registrert enda.</p></div>
            : <>
              <div style={s.card}>
                <h3 style={s.cardTitle}>⏱ Total spilletid — {fmt(totalDuration)}</h3>
                {totalEntries.map(([name,time]) => (
                  <div key={name} style={s.statRow}>
                    <span style={{minWidth:90,fontSize:13}}>{name}</span>
                    <div style={s.barWrap}><div style={{...s.bar,width:totalDuration>0?`${Math.round((time/totalDuration)*100)}%`:"0%"}} /></div>
                    <span style={s.timeLabel}>{fmt(time)}</span>
                  </div>
                ))}
              </div>
              <div style={s.card}>
                <h3 style={s.cardTitle}>📋 Økter ({sessions.length})</h3>
                {sessions.map(sess => (
                  <div key={sess.id} style={s.sessRow}>
                    <span>{sess.date} — {sess.type==="kamp"?`⚽ vs ${sess.opponent||"?"}`:"🏃 Trening"}</span>
                    <span style={s.tag}>{fmt(sess.duration)}</span>
                  </div>
                ))}
              </div>
            </>
          }
        </>)}
      </div>
    );
  }

  // ---- SUMMARY ----
  if (view==="summary") {
    const last = sessions[sessions.length-1];
    return (
      <div style={s.page}>
        <div style={s.header}>
          <h1 style={s.title}>📊 Oppsummering</h1>
          <p style={s.sub}>{last.date} · {fmt(last.duration)}</p>
          {last.type==="kamp" && (
            <p style={{...s.sub,fontSize:20,fontWeight:800,color:"#f1f5f9",marginTop:4}}>
              {last.opponent||"Motstander"} {last.score.home} – {last.score.away}
            </p>
          )}
        </div>
        <div style={s.card}>
          <h3 style={s.cardTitle}>⏱ Spilletid</h3>
          {[...last.players].sort((a,b)=>b.totalTime-a.totalTime).map(p => (
            <div key={p.id} style={s.statRow}>
              <span style={{minWidth:90,fontSize:13}}>{p.name}</span>
              <div style={s.barWrap}><div style={{...s.bar,width:last.duration>0?`${Math.round((p.totalTime/last.duration)*100)}%`:"0%"}} /></div>
              <span style={s.timeLabel}>{fmt(p.totalTime)}</span>
            </div>
          ))}
        </div>

        <div style={s.card}>
          <h3 style={s.cardTitle}>🎽 Tid i roller</h3>
          {[...last.players].filter(p=>p.totalTime>0).sort((a,b)=>b.totalTime-a.totalTime).map(p => {
            const roles = Object.entries(p.roleTimes||{}).sort((a,b)=>b[1]-a[1]);
            if (roles.length===0) return null;
            return (
              <div key={p.id} style={{marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:"#f1f5f9"}}>{p.name}</div>
                {roles.map(([role,sec]) => (
                  <div key={role} style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{...s.roleDot, background:POS_COLOR[role]||"#6b7280"}} />
                    <span style={{fontSize:12,color:"#94a3b8",minWidth:90}}>{role}</span>
                    <div style={{...s.barWrap,flex:1}}>
                      <div style={{...s.bar, width:`${Math.round((sec/p.totalTime)*100)}%`, background:POS_COLOR[role]||"#10b981"}} />
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:"#f1f5f9",minWidth:40,textAlign:"right"}}>{fmt(sec)}</span>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
        {last.notes.length>0 && (
          <div style={s.card}>
            <h3 style={s.cardTitle}>📝 Læringsmomenter</h3>
            {last.notes.map(n => {
              const cat = LEARNING_CATEGORIES.find(c=>c.id===n.category);
              return (
                <div key={n.id} style={s.noteCard}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{...s.catBadge,background:cat.color}}>{cat.label}</span>
                    <span style={s.stars}>{"★".repeat(n.rating)}{"☆".repeat(5-n.rating)}</span>
                  </div>
                  {n.player&&<div style={s.notePlayer}>👤 {n.player}</div>}
                  <div style={s.noteText}>{n.text}</div>
                  <div style={s.noteTime}>{fmt(n.time)}</div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{padding:"0 16px 32px",display:"flex",gap:12}}>
          <button style={{...s.bigBtn,flex:1,background:"#3b82f6"}} onClick={()=>setView("setup")}>← Tilbake</button>
          <button style={{...s.bigBtn,flex:1}} onClick={resetAll}>🔄 Ny økt</button>
        </div>
      </div>
    );
  }

  // ---- SESSION ----
  return (
    <div style={s.page}>
      <div style={s.topBar}>
        <div>
          <div style={s.timerDisplay}>{fmt(timer)}</div>
          <div style={s.sessionLabel}>{sessionType==="kamp"?`⚽ ${opponent||"Kamp"}`:"🏃 Trening"}</div>
        </div>
        {sessionType==="kamp" && (
          <div style={s.scoreBox}>
            <div style={s.scoreTeam}>
              <div style={s.scoreTeamLabel}>Hjemme</div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <button style={s.scoreBtn} onClick={()=>setScore(sc=>({...sc,home:Math.max(0,sc.home-1)}))}>−</button>
                <span style={s.scoreNum}>{score.home}</span>
                <button style={s.scoreBtn} onClick={()=>setScore(sc=>({...sc,home:sc.home+1}))}>+</button>
              </div>
            </div>
            <span style={s.scoreDash}>–</span>
            <div style={s.scoreTeam}>
              <div style={s.scoreTeamLabel}>Borte</div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <button style={s.scoreBtn} onClick={()=>setScore(sc=>({...sc,away:Math.max(0,sc.away-1)}))}>−</button>
                <span style={s.scoreNum}>{score.away}</span>
                <button style={s.scoreBtn} onClick={()=>setScore(sc=>({...sc,away:sc.away+1}))}>+</button>
              </div>
            </div>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          <button style={running?{...s.smBtn,...s.yellow}:{...s.smBtn,...s.green}} onClick={pauseResume}>
            {running?"⏸":"▶️"}
          </button>
          <button style={{...s.smBtn,...s.red}} onClick={endSession}>🏁</button>
        </div>
      </div>

      <div style={s.tabs}>
        {["spill","laering"].map(t => (
          <button key={t} style={tab===t?{...s.tabBtn,...s.tabActive}:s.tabBtn} onClick={()=>setTab(t)}>
            {t==="spill"?"⚽ Bane":"📝 Læring"}
          </button>
        ))}
      </div>

      {tab==="spill" && (<>
        {subMode && (
          <div style={s.subBanner}>
            🔄 Trykk en spiller på banen for å bytte roller — eller velg fra benken for innbytte
          </div>
        )}
        <Pitch activePlayers={activePlayers} subMode={subMode} setSubMode={setSubMode}
          getDisplayTime={getDisplayTime} onChangePosition={changePosition} doSub={doSub} />
        <div style={s.card}>
          <h3 style={s.cardTitle}>⬜ Benk ({benchPlayers.length}) — minst tid øverst</h3>
          {benchPlayers.length===0 && <p style={s.empty}>Ingen på benken</p>}
          {benchPlayers.map(p => (
            <BenchPlayerRow key={p.id} p={p} subMode={subMode} doSub={doSub} onChangePosition={changePosition} />
          ))}
        </div>
        {events.length>0 && (
          <div style={s.card}>
            <h3 style={s.cardTitle}>📋 Hendelser</h3>
            {events.slice(0,6).map((e,i) => (
              <div key={i} style={s.eventRow}>
                <span style={s.eventTime}>{fmt(e.time)}</span>
                <span>{e.text}</span>
              </div>
            ))}
          </div>
        )}
      </>)}

      {tab==="laering" && (
        <div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h3 style={{...s.cardTitle,margin:0}}>📝 Læringsmomenter</h3>
            <button style={{...s.smBtn,...s.green}} onClick={()=>setShowNoteForm(v=>!v)}>
              {showNoteForm?"✕":"+ Legg til"}
            </button>
          </div>
          {showNoteForm && (
            <div style={s.noteForm}>
              <div style={s.btnRow}>
                {LEARNING_CATEGORIES.map(c => (
                  <button key={c.id}
                    style={newNote.category===c.id?{...s.pill,background:c.color,color:"#fff",border:"none"}:s.pill}
                    onClick={()=>setNewNote(n=>({...n,category:c.id}))}>
                    {c.label}
                  </button>
                ))}
              </div>
              <select style={s.input} value={newNote.player} onChange={e=>setNewNote(n=>({...n,player:e.target.value}))}>
                <option value="">Hele laget</option>
                {players.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
              </select>
              <textarea style={{...s.input,height:72,resize:"none"}} placeholder="Beskriv læringsmomentet..."
                value={newNote.text} onChange={e=>setNewNote(n=>({...n,text:e.target.value}))} />
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <span style={{color:"#9ca3af",fontSize:13}}>Vurdering:</span>
                {RATINGS.map(r=>(
                  <button key={r} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",opacity:newNote.rating>=r?1:0.3}}
                    onClick={()=>setNewNote(n=>({...n,rating:r}))}>⭐</button>
                ))}
              </div>
              <button style={s.bigBtn} onClick={addNote}>Lagre notat</button>
            </div>
          )}
          {notes.length===0&&!showNoteForm && <p style={s.empty}>Ingen notater enda. Trykk + for å legge til!</p>}
          {notes.map(n => (
            <NoteCard key={n.id} n={n} players={players}
              onSave={draft=>updateNote(n.id,draft)}
              onDelete={()=>deleteNote(n.id)} />
          ))}
        </div>
      )}
      <div style={{height:32}} />
    </div>
  );
}

const s = {
  page: { minHeight:"100vh", background:"#0f172a", color:"#f1f5f9", fontFamily:"system-ui,sans-serif", maxWidth:480, margin:"0 auto" },
  header: { padding:"28px 20px 16px", textAlign:"center" },
  logo: { fontSize:40, marginBottom:6 },
  title: { margin:0, fontSize:26, fontWeight:800, letterSpacing:-1 },
  sub: { margin:"4px 0 0", color:"#64748b", fontSize:14 },
  card: { margin:"0 12px 12px", background:"#1e293b", borderRadius:16, padding:"14px 16px" },
  cardTitle: { margin:"0 0 12px", fontSize:13, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1 },
  playerRow: { display:"flex", alignItems:"center", gap:10, padding:"7px 0", borderBottom:"1px solid #0f172a" },
  dot: { width:9, height:9, borderRadius:"50%", flexShrink:0 },
  playerName: { fontSize:15, fontWeight:600 },
  posLabel: { fontSize:11, color:"#64748b" },
  nameInput: { flex:1, background:"#0f172a", border:"1px solid #3b82f6", borderRadius:6, padding:"2px 6px", color:"#f1f5f9", fontSize:15 },
  select: { background:"#0f172a", border:"1px solid #334155", borderRadius:6, color:"#94a3b8", fontSize:11, padding:"2px 4px" },
  posSelect: { background:"#0f172a", border:"1px solid #3b82f6", borderRadius:6, color:"#f1f5f9", fontSize:11, padding:"2px 4px" },
  input: { width:"100%", boxSizing:"border-box", background:"#0f172a", border:"1px solid #334155", borderRadius:8, padding:"8px 12px", color:"#f1f5f9", fontSize:14, outline:"none", marginBottom:8 },
  smBtn: { padding:"5px 10px", borderRadius:8, border:"none", cursor:"pointer", fontSize:12, fontWeight:700 },
  green: { background:"#10b981", color:"#fff" },
  gray: { background:"#334155", color:"#94a3b8" },
  yellow: { background:"#f59e0b", color:"#fff" },
  red: { background:"#ef4444", color:"#fff" },
  bigBtn: { width:"100%", padding:"14px", borderRadius:12, border:"none", background:"#10b981", color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer" },
  pill: { padding:"6px 12px", borderRadius:20, border:"1px solid #334155", background:"transparent", color:"#94a3b8", cursor:"pointer", fontSize:12, fontWeight:600 },
  pillActive: { background:"#3b82f6", color:"#fff", border:"1px solid #3b82f6" },
  btnRow: { display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 },
  topBar: { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px 10px", background:"#1e293b", borderBottom:"1px solid #0f172a", gap:8 },
  timerDisplay: { fontSize:28, fontWeight:800, letterSpacing:-1, color:"#10b981", fontVariantNumeric:"tabular-nums" },
  sessionLabel: { fontSize:11, color:"#64748b" },
  scoreBox: { display:"flex", alignItems:"center", gap:6 },
  scoreTeam: { display:"flex", flexDirection:"column", alignItems:"center", gap:2 },
  scoreTeamLabel: { fontSize:9, color:"#64748b", fontWeight:700, textTransform:"uppercase", letterSpacing:0.5 },
  scoreNum: { fontSize:22, fontWeight:800, minWidth:22, textAlign:"center", fontVariantNumeric:"tabular-nums" },
  scoreDash: { fontSize:20, fontWeight:800, color:"#475569", marginTop:14 },
  scoreBtn: { background:"#334155", border:"none", color:"#f1f5f9", borderRadius:6, width:24, height:24, fontSize:16, cursor:"pointer", fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" },
  tabs: { display:"flex", background:"#1e293b", borderBottom:"1px solid #0f172a" },
  tabBtn: { flex:1, padding:"10px", border:"none", background:"transparent", color:"#64748b", fontSize:14, fontWeight:600, cursor:"pointer" },
  tabActive: { color:"#10b981", borderBottom:"2px solid #10b981" },
  timeChip: { background:"#0f172a", borderRadius:8, padding:"3px 8px", fontSize:13, fontWeight:700, color:"#10b981", fontVariantNumeric:"tabular-nums" },
  subBanner: { margin:"8px 12px 0", background:"#1c3a28", border:"1px solid #10b981", borderRadius:10, padding:"8px 12px", fontSize:13, color:"#6ee7b7" },
  eventRow: { display:"flex", gap:12, padding:"5px 0", fontSize:14, borderBottom:"1px solid #0f172a" },
  eventTime: { color:"#64748b", minWidth:40, fontSize:12, fontVariantNumeric:"tabular-nums" },
  noteForm: { background:"#0f172a", borderRadius:12, padding:12, marginBottom:12 },
  noteCard: { background:"#0f172a", borderRadius:10, padding:10, marginTop:8 },
  catBadge: { borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700, color:"#fff" },
  stars: { color:"#f59e0b", fontSize:14 },
  notePlayer: { fontSize:12, color:"#64748b", margin:"4px 0 2px" },
  noteText: { fontSize:14, color:"#f1f5f9", margin:"4px 0" },
  noteTime: { fontSize:11, color:"#475569" },
  statRow: { display:"flex", alignItems:"center", gap:8, marginBottom:8 },
  barWrap: { flex:1, height:8, background:"#0f172a", borderRadius:4, overflow:"hidden" },
  bar: { height:"100%", background:"#10b981", borderRadius:4 },
  timeLabel: { fontSize:13, fontWeight:700, color:"#10b981", minWidth:44, textAlign:"right" },
  sessRow: { display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid #0f172a", fontSize:14 },
  tag: { background:"#0f172a", borderRadius:8, padding:"2px 8px", fontSize:12, color:"#64748b" },
  borrowedTag: { background:"#581c87", color:"#e9d5ff", borderRadius:6, padding:"1px 6px", fontSize:10, fontWeight:700 },
  roleDot: { width:8, height:8, borderRadius:"50%", flexShrink:0 },
  empty: { color:"#475569", fontSize:13, textAlign:"center", padding:"12px 0" },
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <React.StrictMode><App /></React.StrictMode>
);
  </script>
</body>
</html>
